<style>
#instagram {
  max-width: 700px;
  width: 95%;
}

.instagram-row {

}

.instagram-col {
  flex: 1 1 200px;
  max-width: 220px;
  min-width: 180px;

  width: 100% !important;

  height: 320px;

  display: flex;

  align-items: center;
  box-shadow: 0 0 5px rgba(0, 0, 0, 0.05);
  padding: 15px;
  box-sizing: border-box;
}

.placeholder-icon {
  font-size: 36px;
  color: #e1306c;
  margin-bottom: 10px;
}

.placeholder-text {
  font-family: open sans, sans-serif;
  font-size: 1.4rem;
  color: #8e8e8e;
  text-align: center;
  margin: 0;
