{{- $id := .Get 0 -}}
<blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/{{ $id }}/" data-instgrm-version="14" style="background:#FFF; border:0; border-radius:3px; box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15); margin: 1px; width: calc(100% - 2px);">
  <a href="https://www.instagram.com/p/{{ $id }}/" target="_blank" style="text-decoration:none; color:#c13584; font-family:sans-serif; font-size:14px; font-weight:600;">View post on Instagram</a>
</blockquote>
<script async src="//www.instagram.com/embed.js"></script>
